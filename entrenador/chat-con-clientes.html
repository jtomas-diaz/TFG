<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat con Clientes — JFIT</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos-globales.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="layout-principal">

  <!-- ════════════ SIDEBAR ════════════ -->
  <aside class="barra-lateral" id="barra-lateral">
    <div class="sidebar-logo-area">
      <img src="img/logo.png" alt="JFIT" class="sidebar-logo-imagen">
      <div class="sidebar-logo-texto">
        <div class="sidebar-nombre-app">JFIT</div>
        <div class="sidebar-rol-app">Panel Administrador</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-grupo-etiqueta">Principal</div>
      <a href="lista-clientes.html" class="sidebar-enlace"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Mis Clientes</span></a>
      <a href="entrenamiento-cliente.html" class="sidebar-enlace"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="3"/><path d="M6.5 7h11M6.5 12h11M6.5 17h11"/></svg><span>Rutinas</span></a>
      <a href="chat-con-clientes.html" class="sidebar-enlace activo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
      <div class="sidebar-separador"></div>
      <div class="sidebar-grupo-etiqueta">Cuenta</div>
      <a href="perfil.html" class="sidebar-enlace"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg><span>Mi Perfil</span></a>
    </nav>
    <div class="sidebar-zona-usuario">
      <div class="sidebar-avatar-mini">A</div>
      <div class="sidebar-usuario-info">
        <div class="sidebar-usuario-nombre">Administrador</div>
        <div class="sidebar-usuario-rol">Admin · JFIT</div>
      </div>
    </div>
  </aside>

  <!-- ════════════ CONTENIDO ════════════ -->
  <div class="area-contenido" style="overflow:hidden">

    <header class="topbar">
      <div class="topbar-izquierda">
        <button class="boton-menu-movil" onclick="abrirSidebar()" aria-label="Abrir menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-titulo">Mensajes</div>
          <div class="topbar-subtitulo">Chat con clientes</div>
        </div>
      </div>
    </header>

    <!-- Layout del chat (conversaciones + mensajes) -->
    <div class="layout-chat">

      <!-- Panel izquierdo: lista de conversaciones -->
      <aside class="panel-conversaciones" id="panel-conversaciones">
        <div class="cabecera-panel">
          <div class="titulo-panel-chat">Conversaciones</div>
          <div class="buscador-caja" style="max-width:100%">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="buscador-chat" placeholder="Buscar cliente..." oninput="filtrarConversaciones()">
          </div>
        </div>
        <div class="lista-conversaciones" id="lista-conversaciones"></div>
      </aside>

      <!-- Área principal del chat -->
      <main class="area-chat-principal" id="area-chat">

        <!-- Estado vacío -->
        <div class="chat-vacio" id="chat-vacio">
          <div class="chat-vacio-icono">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ECA72C" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h3>Selecciona un cliente</h3>
          <p>Elige una conversación de la lista para empezar a chatear</p>
        </div>

        <!-- Chat activo (oculto inicialmente) -->
        <div id="chat-activo" style="display:none;flex-direction:column;height:100%">

          <div class="cabecera-chat-activo">
            <button class="boton-volver-chat" onclick="volverALista()" aria-label="Volver">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="avatar-usuario avatar-chat-activo" id="inicial-avatar-chat">?</div>
            <div class="info-chat-activo">
              <div class="nombre-chat-activo" id="nombre-chat-activo">—</div>
              <div class="estado-chat-activo">En línea</div>
            </div>
            <div class="acciones-cabecera-chat">
              <button class="boton-icono-chat" title="Ver entrenamiento" onclick="irAEntrenamientoDesdeChat()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="3"/><path d="M6.5 7h11M6.5 12h8"/></svg>
              </button>
              <button class="boton-icono-chat" title="Perfil" onclick="irAListaDesdeChat()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
              </button>
            </div>
          </div>

          <div class="area-mensajes" id="area-mensajes"></div>

          <div class="zona-escritura">
            <div class="envoltorio-input">
              <svg class="icono-input" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              <textarea class="input-mensaje" id="input-mensaje" placeholder="Escribe un mensaje..." rows="1" oninput="ajustarAlturaInput(this)" onkeydown="manejarTeclaEnter(event)"></textarea>
              <svg class="icono-input" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </div>
            <button class="boton-enviar" onclick="enviarMensaje()" aria-label="Enviar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>

        </div><!-- /chat-activo -->
      </main>

    </div><!-- /layout-chat -->
  </div>
</div>

<!-- Nav móvil -->
<nav class="barra-navegacion-movil">
  <a href="lista-clientes.html" class="nav-movil-elemento"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Clientes</span></a>
  <a href="entrenamiento-cliente.html" class="nav-movil-elemento"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="3"/><path d="M6.5 7h11M6.5 12h11M6.5 17h11"/></svg><span>Rutinas</span></a>
  <a href="chat-con-clientes.html" class="nav-movil-elemento activo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
  <a href="perfil.html" class="nav-movil-elemento"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg><span>Perfil</span></a>
</nav>

<script src="js/sidebar.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
