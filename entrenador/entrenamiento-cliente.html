<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rutinas — JFIT</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos-globales.css">
  <link rel="stylesheet" href="css/entrenamiento.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="layout-principal">

  <!-- ════════════ SIDEBAR ════════════ -->
  <aside class="barra-lateral" id="barra-lateral">
    <div class="sidebar-logo-area">
      <img src="img/logo.png" alt="JFIT" class="sidebar-logo-imagen">
      <div class="sidebar-logo-texto">
        <div class="sidebar-nombre-app">JFIT</div>
        <div class="sidebar-rol-app">Panel Administrador</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-grupo-etiqueta">Principal</div>
      <a href="lista-clientes.html" class="sidebar-enlace">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Mis Clientes</span>
      </a>
      <a href="entrenamiento-cliente.html" class="sidebar-enlace activo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="3"/><path d="M6.5 7h11M6.5 12h11M6.5 17h11"/></svg>
        <span>Rutinas</span>
      </a>
      <a href="chat-con-clientes.html" class="sidebar-enlace">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
      </a>
      <div class="sidebar-separador"></div>
      <div class="sidebar-grupo-etiqueta">Cuenta</div>
      <a href="perfil.html" class="sidebar-enlace">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
        <span>Mi Perfil</span>
      </a>
    </nav>
    <div class="sidebar-zona-usuario">
      <div class="sidebar-avatar-mini">A</div>
      <div class="sidebar-usuario-info">
        <div class="sidebar-usuario-nombre">Administrador</div>
        <div class="sidebar-usuario-rol">Admin · JFIT</div>
      </div>
    </div>
  </aside>

  <!-- ════════════ ÁREA DE CONTENIDO ════════════ -->
  <div class="area-contenido">

    <!-- TOPBAR (cambia dinámicamente según la vista) -->
    <header class="topbar">
      <div class="topbar-izquierda">
        <button class="boton-menu-movil" onclick="abrirSidebar()" aria-label="Abrir menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div>
          <div class="topbar-titulo" id="topbar-titulo">Rutinas</div>
          <div class="topbar-subtitulo" id="topbar-subtitulo">Selecciona un cliente para gestionar su plan</div>
        </div>
      </div>
      <div class="topbar-derecha" id="topbar-derecha">
        <!-- El botón cambia según la vista activa -->
      </div>
    </header>

    <!-- ══════════════════════════════════════════
         VISTA 1: SELECCIÓN DE CLIENTE
    ══════════════════════════════════════════ -->
    <main class="contenedor-pagina" id="vista-seleccion">

      <!-- Buscador -->
      <div class="buscador-contenedor">
        <div class="buscador-caja">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="buscador-rutinas"
                 placeholder="Buscar cliente..."
                 oninput="filtrarClientesRutinas()">
        </div>
      </div>

      <div class="etiqueta-seccion">Elige un cliente</div>

      <!-- Grid de clientes -->
      <div class="grid-clientes-rutinas" id="grid-clientes-rutinas"></div>

    </main>

    <!-- ══════════════════════════════════════════
         VISTA 2: RUTINA DEL CLIENTE
    ══════════════════════════════════════════ -->
    <main class="contenedor-pagina" id="vista-rutina" style="display:none">

      <div class="layout-entrenamiento">

        <!-- Columna izquierda: ficha del cliente -->
        <div class="panel-info-cliente">

          <!-- Hero con datos del cliente -->
          <div class="hero-cliente">
            <div class="avatar-usuario avatar-hero" id="avatar-cliente-rutina">?</div>
            <div class="info-hero">
              <h2 id="nombre-cliente-rutina">—</h2>
              <p  id="email-cliente-rutina">—</p>
            </div>
          </div>

          <!-- Estadísticas -->
          <div class="stats-cliente">
            <div class="stat-cliente-item">
              <div class="stat-cliente-num" id="contador-dias-rutina">0</div>
              <div class="stat-cliente-lbl">Días</div>
            </div>
            <div class="stat-cliente-item">
              <div class="stat-cliente-num" id="contador-ejercicios-rutina">0</div>
              <div class="stat-cliente-lbl">Ejercicios</div>
            </div>
          </div>

          <!-- Botón volver a la selección -->
          <button class="boton-volver-seleccion" onclick="volverASeleccion()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Cambiar cliente
          </button>

        </div>

        <!-- Columna derecha: días de entrenamiento -->
        <div class="columna-dias">

          <div class="cabecera-seccion">
            <div class="etiqueta-seccion" style="margin-bottom:0">Días de entrenamiento</div>
            <button class="boton-dorado" id="boton-anadir-dia" onclick="abrirModalDia()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5"  x2="12" y2="19"/>
                <line x1="5"  y1="12" x2="19" y2="12"/>
              </svg>
              Añadir día
            </button>
          </div>

          <!-- Lista de días (poblada por JS) -->
          <div id="lista-dias"></div>

        </div>
      </div>
    </main>

  </div><!-- /area-contenido -->
</div><!-- /layout-principal -->


<!-- ════════ NAV MÓVIL INFERIOR ════════ -->
<nav class="barra-navegacion-movil">
  <a href="lista-clientes.html" class="nav-movil-elemento">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>Clientes</span>
  </a>
  <a href="entrenamiento-cliente.html" class="nav-movil-elemento activo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="3"/><path d="M6.5 7h11M6.5 12h11M6.5 17h11"/></svg>
    <span>Rutinas</span>
  </a>
  <a href="chat-con-clientes.html" class="nav-movil-elemento">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Chat</span>
  </a>
  <a href="perfil.html" class="nav-movil-elemento">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
    <span>Perfil</span>
  </a>
</nav>


<!-- ════════ MODAL: NUEVO DÍA ════════ -->
<div class="fondo-modal" id="modal-dia">
  <div class="modal-contenido">
    <div class="modal-tirador"></div>
    <div class="modal-cabecera">
      <h2 class="modal-titulo">Nuevo Día</h2>
      <button class="modal-cerrar-btn" onclick="cerrarModalDia()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="campo-formulario">
      <label for="input-nombre-dia">Nombre del día</label>
      <input type="text" id="input-nombre-dia" placeholder="Ej: Pecho y Tríceps" autocomplete="off">
    </div>
    <div class="campo-formulario">
      <label for="select-dia-semana">Día de la semana (opcional)</label>
      <select id="select-dia-semana">
        <option value="">Sin asignar</option>
        <option>Lunes</option><option>Martes</option><option>Miércoles</option>
        <option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
      </select>
    </div>
    <div class="acciones-modal">
      <button class="boton-cancelar" onclick="cerrarModalDia()">Cancelar</button>
      <button class="boton-confirmar" onclick="anadirDia()">Añadir</button>
    </div>
  </div>
</div>


<!-- ════════ MODAL: AÑADIR EJERCICIO ════════ -->
<div class="fondo-modal" id="modal-ejercicio">
  <div class="modal-contenido">
    <div class="modal-tirador"></div>
    <div class="modal-cabecera">
      <h2 class="modal-titulo">Añadir Ejercicio</h2>
      <button class="modal-cerrar-btn" onclick="cerrarModalEjercicio()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <input class="buscador-ejercicios" type="text"
           id="buscador-ejercicios-modal"
           placeholder="Buscar ejercicio o grupo muscular..."
           oninput="filtrarEjercicios()">
    <div class="listado-bd-ejercicios" id="listado-bd-ejercicios"></div>
    <div class="separador-modal"></div>
    <div id="seccion-parametros" style="display:none">
      <div class="fila-doble">
        <div class="campo-formulario">
          <label for="input-series">Series</label>
          <input type="number" id="input-series" placeholder="3" min="1">
        </div>
        <div class="campo-formulario">
          <label for="input-reps">Repeticiones</label>
          <input type="number" id="input-reps" placeholder="12" min="1">
        </div>
      </div>
      <div class="campo-formulario">
        <label for="input-descanso">Descanso (segundos)</label>
        <input type="number" id="input-descanso" placeholder="60" min="0">
      </div>
      <div class="campo-formulario">
        <label for="input-notas-ejercicio">Notas (opcional)</label>
        <input type="text" id="input-notas-ejercicio" placeholder="Peso, técnica...">
      </div>
    </div>
    <div class="acciones-modal">
      <button class="boton-cancelar" onclick="cerrarModalEjercicio()">Cancelar</button>
      <button class="boton-confirmar" onclick="anadirEjercicio()">Añadir</button>
    </div>
  </div>
</div>

<div class="notificacion-toast" id="notificacion"></div>

<script src="js/sidebar.js"></script>
<script src="js/entrenamiento.js"></script>
</body>
</html>
