<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Clientes — JFIT</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos-globales.css">
  <link rel="stylesheet" href="css/lista-clientes.css">
</head>
<body>

<!-- ════════════════════════════════════════
     OVERLAY MÓVIL (cierra sidebar)
════════════════════════════════════════ -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ════════════════════════════════════════
     LAYOUT PRINCIPAL
════════════════════════════════════════ -->
<div class="layout-principal">

  <!-- ════════════ SIDEBAR BLANCA ════════════ -->
  <aside class="barra-lateral" id="barra-lateral">

    <!-- Logo -->
    <div class="sidebar-logo-area">
      <img src="img/logo.png" alt="JFIT" class="sidebar-logo-imagen">
      <div class="sidebar-logo-texto">
        <div class="sidebar-nombre-app">JFIT</div>
        <div class="sidebar-rol-app">Panel Administrador</div>
      </div>
    </div>

    <!-- Navegación principal -->
    <nav class="sidebar-nav">
      <div class="sidebar-grupo-etiqueta">Principal</div>

      <a href="lista-clientes.html" class="sidebar-enlace activo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Mis Clientes</span>
      </a>

      <a href="entrenamiento-cliente.html" class="sidebar-enlace">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2">
          <rect x="2" y="3" width="20" height="18" rx="3"/>
          <path d="M6.5 7h11M6.5 12h11M6.5 17h11"/>
        </svg>
        <span>Rutinas</span>
      </a>

      <a href="chat-con-clientes.html" class="sidebar-enlace">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Chat</span>
      </a>

      <div class="sidebar-separador"></div>
      <div class="sidebar-grupo-etiqueta">Cuenta</div>

      <a href="perfil.html" class="sidebar-enlace">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2">
          <circle cx="12" cy="7" r="4"/>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        </svg>
        <span>Mi Perfil</span>
      </a>
    </nav>

    <!-- Usuario logueado -->
    <div class="sidebar-zona-usuario">
      <div class="sidebar-avatar-mini">A</div>
      <div class="sidebar-usuario-info">
        <div class="sidebar-usuario-nombre">Administrador</div>
        <div class="sidebar-usuario-rol">Admin · JFIT</div>
      </div>
    </div>

  </aside>
  <!-- /sidebar -->

  <!-- ════════════ ÁREA DE CONTENIDO ════════════ -->
  <div class="area-contenido">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-izquierda">
        <!-- Botón hamburguesa (solo móvil) -->
        <button class="boton-menu-movil" onclick="abrirSidebar()" aria-label="Abrir menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div>
          <div class="topbar-titulo">Mis Clientes</div>
          <div class="topbar-subtitulo">Panel Administrador</div>
        </div>
      </div>
      <div class="topbar-derecha">
        <button class="boton-dorado" onclick="abrirModalAnadir()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5"  x2="12" y2="19"/>
            <line x1="5"  y1="12" x2="19" y2="12"/>
          </svg>
          Añadir cliente
        </button>
      </div>
    </header>

    <!-- Contenido de la página -->
    <main class="contenedor-pagina">

      <!-- Estadísticas -->
      <div class="fila-estadisticas">
        <div class="tarjeta-estadistica">
          <div class="estadistica-valor" id="total-clientes">0</div>
          <div class="estadistica-etiqueta">Total clientes</div>
        </div>
        <div class="tarjeta-estadistica">
          <div class="estadistica-valor" id="clientes-activos">0</div>
          <div class="estadistica-etiqueta">Activos</div>
        </div>
        <div class="tarjeta-estadistica">
          <div class="estadistica-valor" id="clientes-inactivos">0</div>
          <div class="estadistica-etiqueta">Inactivos</div>
        </div>
      </div>

      <!-- Buscador -->
      <div class="buscador-contenedor">
        <div class="buscador-caja">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="buscador-clientes"
                 placeholder="Buscar por nombre o email..."
                 oninput="filtrarClientes()">
        </div>
      </div>

      <!-- Etiqueta sección -->
      <div class="etiqueta-seccion">Lista de clientes</div>

      <!-- Grid de clientes -->
      <div class="grid-clientes" id="lista-clientes"></div>

    </main>
  </div>
  <!-- /area-contenido -->

</div>
<!-- /layout-principal -->

<!-- Barra de nav inferior MÓVIL -->
<nav class="barra-navegacion-movil">
  <a href="lista-clientes.html" class="nav-movil-elemento activo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <span>Clientes</span>
  </a>
  <a href="entrenamiento-cliente.html" class="nav-movil-elemento">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2">
      <rect x="2" y="3" width="20" height="18" rx="3"/>
      <path d="M6.5 7h11M6.5 12h11M6.5 17h11"/>
    </svg>
    <span>Rutinas</span>
  </a>
  <a href="chat-con-clientes.html" class="nav-movil-elemento">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Chat</span>
  </a>
  <a href="perfil.html" class="nav-movil-elemento">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2">
      <circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    </svg>
    <span>Perfil</span>
  </a>
</nav>


<!-- ════════ MODAL: AÑADIR CLIENTE ════════ -->
<div class="fondo-modal" id="modal-anadir">
  <div class="modal-contenido">
    <div class="modal-tirador"></div>
    <div class="modal-cabecera">
      <h2 class="modal-titulo">Añadir Cliente</h2>
      <button class="modal-cerrar-btn" onclick="cerrarModalAnadir()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="campo-formulario">
      <label for="input-nombre">Nombre completo</label>
      <input type="text" id="input-nombre" placeholder="Ej: Juan García" autocomplete="off">
    </div>
    <div class="campo-formulario">
      <label for="input-email">Correo electrónico</label>
      <input type="email" id="input-email" placeholder="cliente@correo.com" autocomplete="off">
    </div>
    <div class="campo-formulario">
      <label for="input-estado">Estado</label>
      <input type="text" id="input-estado" placeholder="activo / inactivo">
    </div>
    <div class="acciones-modal">
      <button class="boton-cancelar" onclick="cerrarModalAnadir()">Cancelar</button>
      <button class="boton-confirmar" onclick="anadirCliente()">Añadir</button>
    </div>
  </div>
</div>

<!-- ════════ MODAL: ELIMINAR CLIENTE ════════ -->
<div class="fondo-modal" id="modal-eliminar">
  <div class="modal-contenido">
    <div class="modal-tirador"></div>
    <div class="modal-eliminar" style="text-align:center">
      <div class="icono-eliminar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </div>
      <h2 class="modal-titulo">Eliminar cliente</h2>
      <p id="texto-confirmar-eliminar" style="font-size:13px;color:var(--texto-suave);margin-top:8px;line-height:1.7"></p>
    </div>
    <div class="acciones-modal" style="margin-top:22px">
      <button class="boton-cancelar" onclick="cerrarModalEliminar()">Cancelar</button>
      <button class="boton-peligro" onclick="confirmarEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<div class="notificacion-toast" id="notificacion"></div>

<script src="js/sidebar.js"></script>
<script src="js/lista-clientes.js"></script>
</body>
</html>
